name: Test with Latest Dependencies

on:
  schedule:
    - cron: "0 8 * * *"

jobs:
  test-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Update dependencies to latest
        run: go get -u -t ./...

      - name: Run tests
        run: go test ./...
